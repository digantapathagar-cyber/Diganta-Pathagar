<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1a2e;--ink2:#16213e;--ink3:#0f3460;
  --gold:#c9a84c;--gold2:#a07c30;--gold3:#e8c97a;
  --cream:#f5f0e8;--cream2:#ede6d6;
  --text:#2d2a22;--muted:#7a7060;--lighter:#a09880;
  --green:#2d7a52;--green-bg:#e8f5ee;
  --red:#b03030;--red-bg:#fceaea;
  --blue:#2a5f9e;--blue-bg:#e8f0fa;
  --border:#d4c9b0;--border2:#c0b498;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
  --shadow2:0 8px 40px rgba(0,0,0,0.13);
}
html{overscroll-behavior:none;}
body{font-family:'Hind Siliguri',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px;overscroll-behavior:none;}

.sync-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-left:4px;transition:.3s;}
.sync-dot.live{background:#2ecc71;box-shadow:0 0 6px #2ecc71;}

.toast-wrap{position:fixed;top:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink2);color:var(--cream);padding:12px 20px;border-radius:10px;font-size:14px;animation:slideIn .25s ease;border-left:4px solid var(--gold);max-width:280px;}
.toast.err{border-left-color:#e05050;}.toast.ok{border-left-color:var(--green);}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}

.fb-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--ink);gap:16px;}
.fb-loading .spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.fb-loading p{color:var(--gold3);font-size:14px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HEADER ── */
.header{background:var(--ink2);border-bottom:1px solid rgba(201,168,76,.15);position:sticky;top:0;z-index:80;}
.h-top{max-width:1120px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.h-brand{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.h-logo{width:36px;height:36px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.h-logo svg{width:22px;height:22px;}
.h-name{font-family:'Libre Baskerville',serif;font-size:16px;color:var(--gold3);}
.h-right{display:flex;align-items:center;gap:8px;}

/* User avatar in header — click goes to My List */
.h-avatar-btn{background:none;border:none;cursor:pointer;padding:2px;border-radius:50%;transition:.15s;}
.h-avatar-btn img,.h-avatar-btn .av-ph{
  width:34px;height:34px;border-radius:50%;border:2px solid rgba(201,168,76,.4);
  object-fit:cover;display:flex;align-items:center;justify-content:center;
  background:rgba(201,168,76,.15);color:var(--gold3);font-size:13px;font-weight:700;
}
.h-avatar-btn:hover img,.h-avatar-btn:hover .av-ph{border-color:var(--gold);}

/* Login button */
.btn-login-pro{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 16px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--ink2);font-family:'Hind Siliguri',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  border:none;transition:.2s;box-shadow:0 2px 10px rgba(201,168,76,.3);
}
.btn-login-pro:hover{background:linear-gradient(135deg,var(--gold3),var(--gold));transform:translateY(-1px);}
.btn-login-pro svg{width:15px;height:15px;}

.h-logo.tapped{background:rgba(201,168,76,.35) !important;}

/* NAV */
.h-nav{border-top:1px solid rgba(255,255,255,.05);}
.h-nav-inner{max-width:1120px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none;}
.h-nav-inner::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-size:14px;color:rgba(255,255,255,.45);padding:11px 16px;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;}
.nav-btn:hover{color:rgba(255,255,255,.75);}.nav-btn.on{color:var(--gold3);border-bottom-color:var(--gold);}

.main{max-width:1120px;margin:0 auto;padding:24px 20px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.si-gold{background:#fdf5e0;}.si-blue{background:var(--blue-bg);}.si-green{background:var(--green-bg);}.si-red{background:var(--red-bg);}
.stat-val{font-size:24px;font-weight:700;color:var(--text);line-height:1;}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px;}

.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
.card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}

.inp{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 14px;font-family:'Hind Siliguri',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;transition:.2s;margin-bottom:10px;}
.inp:focus{border-color:var(--gold2);}select.inp{cursor:pointer;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.inp-row{grid-template-columns:1fr;}}

.btn{border:none;border-radius:9px;padding:10px 20px;font-family:'Hind Siliguri',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-dark{background:var(--ink2);color:var(--cream);}.btn-dark:hover{background:var(--ink3);}
.btn-gold{background:var(--gold);color:#1a1a2e;}.btn-gold:hover{background:var(--gold2);}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{background:#1e4d8a;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--muted);}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink2);}
.btn-grp{display:flex;gap:6px;flex-wrap:wrap;}
.btn-google{background:#fff;border:1.5px solid var(--border);color:var(--text);width:100%;justify-content:center;padding:12px;font-size:15px;margin-bottom:12px;border-radius:9px;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-weight:600;}
.btn-google:hover{background:var(--cream);}

.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1.5px solid var(--border);padding:8px 12px;text-align:left;}
.tbl td{padding:12px;border-bottom:1px solid var(--cream2);font-size:14px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}.tbl tr:hover td{background:var(--cream);}
.empty{color:var(--lighter);font-size:14px;text-align:center;padding:32px;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.bg-green{background:var(--green-bg);color:var(--green);}.bg-blue{background:var(--blue-bg);color:var(--blue);}
.bg-red{background:var(--red-bg);color:var(--red);}.bg-amber{background:#fdf5e0;color:#8a6200;}
.bg-gray{background:#f0ece4;color:var(--muted);}

.modal-overlay{position:fixed;inset:0;background:rgba(15,20,40,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
.modal-box{background:var(--cream);border-radius:18px;padding:28px;width:440px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-size:17px;font-weight:700;color:var(--text);}
.modal-close{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;padding:2px 6px;}
.modal-close:hover{color:var(--red);}
.modal-foot{display:flex;gap:10px;margin-top:20px;}.modal-foot .btn{flex:1;justify-content:center;}

.drop-wrap{position:relative;margin-bottom:10px;}
.drop-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--gold2);border-top:none;border-radius:0 0 10px 10px;max-height:170px;overflow-y:auto;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.1);}
.drop-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--cream2);}
.drop-item:last-child{border-bottom:none;}.drop-item:hover{background:var(--cream);}

.search-wrap{position:relative;flex:1;max-width:400px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);}
.search-inp{padding-left:36px !important;}

.activity-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--cream2);}
.activity-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.act-text{font-size:14px;flex:1;}

.borrow-section{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:640px){.borrow-section{grid-template-columns:1fr;}}

.offline-bar{background:#c0392b;color:#fff;text-align:center;padding:7px;font-size:13px;display:none;}
.offline-bar.show{display:block;}

/* Book Grid & Cards */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:16px;margin-bottom:18px;}
.book-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;}
.book-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px);}
.book-cover{width:100%;height:120px;background:linear-gradient(135deg,var(--ink2),var(--ink3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:10px;overflow:hidden;}
.book-cover img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.book-cover-placeholder{font-size:30px;}
.book-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px;line-height:1.3;}
.book-author{font-size:12px;color:var(--muted);}

.stars{display:flex;gap:2px;}.star{font-size:16px;cursor:pointer;color:#ddd;transition:.1s;}.star.on{color:#f0a500;}

.auth-tab{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;}
.auth-tab-btn{flex:1;background:none;border:none;padding:12px;font-family:'Hind Siliguri',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;}
.auth-tab-btn.on{color:var(--ink2);border-bottom-color:var(--gold);}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:13px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.comment-item{padding:14px;border-radius:10px;background:var(--cream);border:1px solid var(--border);margin-bottom:10px;}
.comment-user{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:4px;}
.comment-text{font-size:14px;color:var(--text);line-height:1.6;}
.comment-time{font-size:11px;color:var(--lighter);margin-top:4px;}
.rating-bar{display:flex;align-items:center;gap:6px;}
.rating-count{font-size:12px;color:var(--muted);}

/* Profile Card */
.profile-card{background:linear-gradient(135deg,var(--ink2),var(--ink3));border-radius:16px;padding:24px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden;}
.profile-card::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);}
.profile-avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(201,168,76,.5);object-fit:cover;margin-bottom:12px;}
.profile-avatar-placeholder{width:72px;height:72px;border-radius:50%;background:rgba(201,168,76,.15);border:3px solid rgba(201,168,76,.5);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold3);margin-bottom:12px;}
.profile-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;}
.profile-email{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:4px;}
.profile-role{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(201,168,76,.2);color:var(--gold3);border:1px solid rgba(201,168,76,.3);}
.profile-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.btn-profile-action{border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:.15s;border:1px solid;}
.btn-profile-logout{background:rgba(176,48,48,.2);border-color:rgba(176,48,48,.4);color:#ff8080;}
.btn-profile-logout:hover{background:rgba(176,48,48,.35);}
.btn-profile-admin-exit{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.3);color:var(--gold3);}
.btn-profile-admin-exit:hover{background:rgba(201,168,76,.25);}

/* Settings logged-in users */
.logged-user-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:var(--cream);border:1px solid var(--border);margin-bottom:8px;}
.logged-user-av{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
.logged-user-av-p{width:40px;height:40px;border-radius:50%;background:var(--ink2);display:flex;align-items:center;justify-content:center;color:var(--gold3);font-size:14px;font-weight:700;border:2px solid var(--gold);}
</style>
</head>
<body>
<div class="offline-bar" id="offlineBar">📡 ইন্টারনেট সংযোগ নেই</div>
<div id="app"><div class="fb-loading"><div class="spinner"></div><p>সংযোগ হচ্ছে...</p></div></div>
<div class="toast-wrap" id="toasts"></div>

<script>
// ── CONFIG ──
const ADMIN_EMAILS = [
  "your-admin@gmail.com",
  "second-admin@gmail.com",
];

const CATS=["উপন্যাস","ছোটগল্প","কবিতা","নাটক","সায়েন্স ফিকশন","জীবনী","ইতিহাস","ধর্মীয়","প্রবন্ধ","শিশুসাহিত্য","বিজ্ঞান","অন্যান্য"];
const LOGO_SVG=`<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="26" width="30" height="4" rx="2" fill="#c9a84c"/><path d="M18 10 Q11 6 5 8 L5 22 Q11 20 18 24 Q25 20 31 22 L31 8 Q25 6 18 10Z" stroke="#c9a84c" stroke-width="1.4" fill="rgba(201,168,76,0.08)"/><line x1="18" y1="10" x2="18" y2="24" stroke="#c9a84c" stroke-width="1"/><circle cx="18" cy="8" r="2" fill="#c9a84c" opacity=".5"/></svg>`;
const GOOGLE_SVG=`<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0S6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`;

let S={
  screen:'loading',role:'guest',tab:0,user:null,
  books:{},members:{},borrows:{},passes:[],complaints:{},reviews:{},discussions:{},
  onlineUsers:{},
  modal:null,form:{},
  borrow:{bookId:'',bookTitle:'',memberId:'',memberName:'',bookQuery:'',memberQuery:''},
  search:'',searchCat:'',
  ui:{dropBook:false,dropMember:false},
  showAdminLogin:false,adminPwInput:'',
  syncLive:false,logoTapCount:0,logoTapTimer:null,
  complaintText:'',authTab:'login',authForm:{},
  selectedBook:null,newRating:0,newReview:'',newComment:'',
  myReadlist:{},myFavs:{}
};

// Tab index helpers — recomputed each render
function getTabList(){
  const isAdmin=S.role==='admin';
  const isUser=S.role==='user'||isAdmin;
  const tabs=['ড্যাশবোর্ড','বইয়ের তালিকা','অনুসন্ধান'];
  if(isUser)tabs.push('আমার তালিকা');
  if(isAdmin){tabs.push('সদস্যবৃন্দ');tabs.push('বই ধার');tabs.push('অভিযোগ');tabs.push('সেটিংস');}
  else tabs.push('অভিযোগ');
  return tabs;
}
function tabIndex(name){return getTabList().indexOf(name);}

function fb(){return window._fb;}
function fbPush(p,v){const{db,ref,push}=fb();return push(ref(db,p),v);}
function fbRemove(p){const{db,ref,remove}=fb();return remove(ref(db,p));}
function fbUpdate(p,v){const{db,ref,update}=fb();return update(ref(db,p),v);}
function fbSet(p,v){const{db,ref,set}=fb();return set(ref(db,p),v);}
function fbListen(p,cb){const{db,ref,onValue}=fb();return onValue(ref(db,p),snap=>{cb(snap.exists()?snap.val():null);});}
function safeKey(uid){return uid.replace(/[.#$\[\]]/g,'_');}
function tryRender(){if(S.screen==='app')render();}

function isAdminEmail(email){
  if(!email)return false;
  return ADMIN_EMAILS.map(e=>e.toLowerCase().trim()).includes(email.toLowerCase().trim());
}

function initListeners(){
  fbListen('books',v=>{S.books=v||{};tryRender();});
  fbListen('members',v=>{S.members=v||{};tryRender();});
  fbListen('borrows',v=>{S.borrows=v||{};tryRender();});
  fbListen('complaints',v=>{S.complaints=v||{};tryRender();});
  fbListen('reviews',v=>{S.reviews=v||{};tryRender();});
  fbListen('discussions',v=>{S.discussions=v||{};tryRender();});
  fbListen('onlineUsers',v=>{S.onlineUsers=v||{};tryRender();});
  fbListen('passes',v=>{
    if(v){S.passes=typeof v==='object'?Object.values(v):v;}
    else{fbSet('passes',{p0:'diganta2025'});S.passes=['diganta2025'];}
    if(S.screen==='loading'){S.screen='app';render();}
    else tryRender();
  });
  S.syncLive=true;
  const{auth,onAuthStateChanged}=window._auth;
  onAuthStateChanged(auth,user=>{
    if(user){
      S.user=user;
      if(isAdminEmail(user.email)){
        S.role='admin';
      } else {
        if(S.role!=='admin')S.role='user';
      }
      const uid=safeKey(user.uid);
      fbSet('onlineUsers/'+uid,{
        name:user.displayName||'অজানা',
        email:user.email||'',
        photo:user.photoURL||'',
        lastSeen:nowDate(),
        isAdmin:isAdminEmail(user.email)
      });
      fbListen('readlists/'+uid,v=>{S.myReadlist=v||{};tryRender();});
      fbListen('favs/'+uid,v=>{S.myFavs=v||{};tryRender();});
    }else{
      if(S.user){
        const uid=safeKey(S.user.uid);
        fbRemove('onlineUsers/'+uid);
      }
      S.user=null;
      if(S.role!=='admin')S.role='guest';
      else S.role='guest'; // password-admin also logs out fully
      S.myReadlist={};S.myFavs={};
    }
    tryRender();
  });
}

function toast(msg,type='ok'){
  const w=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast '+type;el.textContent=msg;
  w.appendChild(el);setTimeout(()=>el.remove(),3500);
}

/* ── AUTH ── */
async function googleLogin(){
  try{
    const{auth,signInWithPopup,googleProvider}=window._auth;
    await signInWithPopup(auth,googleProvider);
    toast('স্বাগতম! ✓');S.modal=null;render();
  }catch(e){toast('Google login ব্যর্থ','err');}
}
async function emailRegister(){
  const{name,email,password}=S.authForm;
  if(!name||!email||!password)return toast('সব ঘর পূরণ করুন','err');
  if(password.length<6)return toast('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর','err');
  try{
    const{auth,createUserWithEmailAndPassword,updateProfile}=window._auth;
    const cred=await createUserWithEmailAndPassword(auth,email,password);
    await updateProfile(cred.user,{displayName:name});
    toast('অ্যাকাউন্ট তৈরি হয়েছে ✓');S.modal=null;S.authForm={};render();
  }catch(e){
    if(e.code==='auth/email-already-in-use')toast('এই ইমেইল আগেই আছে','err');
    else toast('রেজিস্ট্রেশন ব্যর্থ','err');
  }
}
async function emailLogin(){
  const{email,password}=S.authForm;
  if(!email||!password)return toast('ইমেইল ও পাসওয়ার্ড দিন','err');
  try{
    const{auth,signInWithEmailAndPassword}=window._auth;
    await signInWithEmailAndPassword(auth,email,password);
    toast('স্বাগতম! ✓');S.modal=null;S.authForm={};render();
  }catch(e){toast('ইমেইল বা পাসওয়ার্ড ভুল','err');}
}
async function logout(){
  if(S.user){const uid=safeKey(S.user.uid);fbRemove('onlineUsers/'+uid);}
  const{auth,signOut}=window._auth;
  await signOut(auth);
  S.role='guest';
  // Go back to dashboard tab
  S.tab=0;
  S.selectedBook=null;
  toast('লগআউট হয়েছে');
  render();
}

/* ── ADMIN (password) ── */
function handleLogoTap(){
  if(S.role==='admin'&&S.user&&isAdminEmail(S.user.email))return;
  S.logoTapCount++;
  const logo=document.querySelector('.h-logo');
  if(logo){logo.classList.add('tapped');setTimeout(()=>logo.classList.remove('tapped'),200);}
  if(S.logoTapTimer)clearTimeout(S.logoTapTimer);
  S.logoTapTimer=setTimeout(()=>{S.logoTapCount=0;},1200);
  if(S.logoTapCount>=3){S.logoTapCount=0;openAdminLogin();}
}
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey&&e.key==='A'){e.preventDefault();openAdminLogin();}});
function openAdminLogin(){if(S.role==='admin')return;S.showAdminLogin=true;S.adminPwInput='';render();setTimeout(()=>{const f=document.getElementById('adminPwField');if(f)f.focus();},100);}
function closeAdminLogin(){S.showAdminLogin=false;S.adminPwInput='';render();}
function tryAdminLogin(){
  const pw=S.adminPwInput.trim();
  if(!pw)return toast('পাসওয়ার্ড দিন','err');
  if(S.passes.includes(pw)){S.role='admin';S.showAdminLogin=false;S.adminPwInput='';toast('অ্যাডমিন মোড ✓');render();}
  else toast('ভুল পাসওয়ার্ড!','err');
}
// Called from Settings → "Admin মোড বন্ধ"
function adminExitMode(){
  // If email-based admin → full logout
  if(S.user&&isAdminEmail(S.user.email)){logout();return;}
  // Password-admin → just drop role, stay as guest/user
  S.role=S.user?'user':'guest';
  S.tab=0;
  toast('অ্যাডমিন মোড বন্ধ');
  render();
}

/* ── BOOKS ── */
function saveBook(){
  const{title,author,cat,total,isbn,shelf,coverUrl,editId}=S.form;
  if(!title||!cat)return toast('বইয়ের নাম ও বিভাগ আবশ্যক','err');
  const tot=parseInt(total)||1;
  const cover=coverUrl||'';
  if(editId){
    const old=S.books[editId];
    const newAvail=Math.max(0,(old.avail||0)+(tot-(old.total||1)));
    fbUpdate('books/'+editId,{title,author:author||'অজানা লেখক',cat,total:tot,avail:newAvail,isbn:isbn||'',shelf:shelf||'',cover})
      .then(()=>{S.modal=null;S.form={};toast('আপডেট হয়েছে');render();});
  }else{
    const dup=Object.values(S.books).find(b=>b.title.trim().toLowerCase()===title.trim().toLowerCase());
    if(dup&&!confirm('"'+title+'" নামে বই আগেই আছে!\nআবারও যোগ করবেন?'))return;
    fbPush('books',{title,author:author||'অজানা লেখক',cat,total:tot,avail:tot,isbn:isbn||'',shelf:shelf||'',cover,addedAt:nowDate()})
      .then(()=>{S.modal=null;S.form={};toast('বই যোগ হয়েছে');render();});
  }
}
function editBook(id){const b=S.books[id];S.form={editId:id,title:b.title,author:b.author||'',cat:b.cat,total:String(b.total),isbn:b.isbn||'',shelf:b.shelf||'',coverUrl:b.cover||''};S.modal='book';render();}
function deleteBook(id){
  if(Object.values(S.borrows).filter(b=>b.bookId===id&&!b.ret).length>0)return toast('বইটি ধারে আছে','err');
  if(!confirm('"'+S.books[id].title+'" মুছে দেবেন?'))return;
  fbRemove('books/'+id).then(()=>toast('মুছে গেছে'));
}

/* ── MEMBERS ── */
function saveMember(){
  const{name,phone,address,editId}=S.form;
  if(!name||!phone)return toast('নাম ও ফোন আবশ্যক','err');
  if(editId){
    fbUpdate('members/'+editId,{name,phone,address:address||'',joinedAt:S.form.joinedAt||nowDate()})
      .then(()=>{S.modal=null;S.form={};toast('আপডেট হয়েছে');render();});
  }else{
    if(Object.values(S.members).find(m=>m.phone===phone))return toast('এই ফোন আগেই আছে','err');
    fbPush('members',{name,phone,address:address||'',joinedAt:nowDate(),active:true})
      .then(()=>{S.modal=null;S.form={};toast('সদস্য যোগ হয়েছে');render();});
  }
}
function editMember(id){const m=S.members[id];S.form={editId:id,name:m.name,phone:m.phone,address:m.address||'',joinedAt:m.joinedAt||''};S.modal='member';render();}
function deleteMember(id){
  if(Object.values(S.borrows).filter(b=>b.memberId===id&&!b.ret).length>0)return toast('ধার পেন্ডিং আছে','err');
  if(!confirm('সদস্যকে মুছে দেবেন?'))return;
  fbRemove('members/'+id).then(()=>toast('মুছে গেছে'));
}

/* ── BORROW ── */
function issueBorrow(){
  if(!S.borrow.bookId)return toast('বই সিলেক্ট করুন','err');
  if(!S.borrow.memberId)return toast('সদস্য সিলেক্ট করুন','err');
  const bk=S.books[S.borrow.bookId];
  if(!bk||bk.avail<1)return toast('পাওয়া যাচ্ছে না','err');
  const dueDays=parseInt(document.getElementById('dueDays')?.value)||14;
  fbPush('borrows',{
    bookId:S.borrow.bookId,bookTitle:S.borrow.bookTitle,
    memberId:S.borrow.memberId,memberName:S.borrow.memberName,
    issuedAt:nowDate(),dueDate:futureDate(dueDays),ret:false,returnedAt:null
  }).then(()=>{
    fbUpdate('books/'+S.borrow.bookId,{avail:bk.avail-1});
    S.borrow={bookId:'',bookTitle:'',memberId:'',memberName:'',bookQuery:'',memberQuery:''};
    toast('ধার দেওয়া হয়েছে');render();
  });
}
function returnBorrow(id){
  const rec=S.borrows[id];if(!rec)return;
  const bk=S.books[rec.bookId];
  fbUpdate('borrows/'+id,{ret:true,returnedAt:nowDate()}).then(()=>{
    if(bk)fbUpdate('books/'+rec.bookId,{avail:(bk.avail||0)+1});
    toast('ফেরত নেওয়া হয়েছে');
  });
}

/* ── REVIEWS ── */
function avgRating(bookId){
  const rv=S.reviews[bookId];if(!rv)return 0;
  const vals=Object.values(rv);
  return vals.reduce((a,b)=>a+b.rating,0)/vals.length;
}
function submitReview(){
  if(!S.user)return toast('আগে লগইন করুন','err');
  if(!S.selectedBook)return;
  if(!S.newRating)return toast('রেটিং দিন','err');
  if(!S.newReview.trim())return toast('রিভিউ লিখুন','err');
  const uid=safeKey(S.user.uid);
  fbSet('reviews/'+S.selectedBook.id+'/'+uid,{
    rating:S.newRating,text:S.newReview.trim(),
    userName:S.user.displayName||'অজানা',createdAt:nowDate()
  }).then(()=>{S.newRating=0;S.newReview='';toast('রিভিউ দেওয়া হয়েছে ✓');render();});
}

/* ── PASS ── */
function addPass(){
  const pw=(S.form.newPass||'').trim();
  if(pw.length<6)return toast('কমপক্ষে ৬ অক্ষর','err');
  if(S.passes.includes(pw))return toast('আগেই আছে','err');
  fbPush('passes',pw).then(()=>{S.form.newPass='';toast('যোগ হয়েছে');render();});
}
function removePass(pw){
  if(S.passes.length<=1)return toast('অন্তত একটি রাখতে হবে','err');
  const{db,ref,onValue,remove:fbRem}=fb();
  onValue(ref(db,'passes'),snap=>{
    if(!snap.exists())return;
    for(const[k,v]of Object.entries(snap.val())){
      if(v===pw){fbRem(ref(db,'passes/'+k)).then(()=>toast('মুছে গেছে'));break;}
    }
  },{onlyOnce:true});
}

/* ── HELPERS ── */
function nowDate(){return new Date().toLocaleDateString('bn-BD',{day:'numeric',month:'long',year:'numeric'});}
function futureDate(days){const d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString('bn-BD',{day:'numeric',month:'long',year:'numeric'});}
function memberBorrowCount(mId){return Object.values(S.borrows).filter(b=>b.memberId===mId&&!b.ret).length;}
function booksArr(){return Object.entries(S.books).map(([id,v])=>({id,...v}));}
function membersArr(){return Object.entries(S.members).map(([id,v])=>({id,...v}));}
function borrowsArr(){return Object.entries(S.borrows).map(([id,v])=>({id,...v}));}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function starsHTML(rating,interactive){
  let h='<div class="stars">';
  for(let i=1;i<=5;i++){
    if(interactive)h+='<span class="star '+(i<=S.newRating?'on':'')+'" data-star="'+i+'">★</span>';
    else h+='<span class="star '+(i<=Math.round(rating)?'on':'')+'">★</span>';
  }
  return h+'</div>';
}

/* ── RENDER ── */
// Preserve scroll position across re-renders
let _scrollY=0;
function render(){
  _scrollY=window.scrollY;
  document.getElementById('app').innerHTML=
    S.screen==='loading'
      ?'<div class="fb-loading"><div class="spinner"></div><p>সংযোগ হচ্ছে...</p></div>'
      :renderApp();
  attachEvents();
  // Restore scroll only for same-tab re-renders; not after tab switch
  if(!_tabSwitched){
    requestAnimationFrame(()=>window.scrollTo(0,_scrollY));
  }
  _tabSwitched=false;
}
let _tabSwitched=false;
function switchTab(idx){
  _tabSwitched=true;
  S.tab=idx;
  S.selectedBook=null;
  S.search='';
  window.scrollTo(0,0);
  render();
}

function attachEvents(){
  document.querySelector('.h-brand')?.addEventListener('click',handleLogoTap);
  document.querySelectorAll('[data-action]').forEach(el=>{
    const a=el.dataset.action;
    if(a==='googleLogin')el.onclick=googleLogin;
    if(a==='emailLogin')el.onclick=emailLogin;
    if(a==='emailRegister')el.onclick=emailRegister;
    if(a==='logout')el.onclick=logout;
    if(a==='tryAdminLogin')el.onclick=tryAdminLogin;
    if(a==='closeAdminLogin')el.onclick=closeAdminLogin;
    if(a==='adminExitMode')el.onclick=adminExitMode;
    if(a==='saveBook')el.onclick=saveBook;
    if(a==='saveMember')el.onclick=saveMember;
    if(a==='issueBorrow')el.onclick=issueBorrow;
    if(a==='addPass')el.onclick=addPass;
    if(a==='submitReview')el.onclick=submitReview;
    if(a==='submitComment')el.onclick=submitComment;
    if(a==='submitComplaint')el.onclick=submitComplaint;
    if(a==='backFromBook'){el.onclick=()=>{S.selectedBook=null;S.newRating=0;S.newReview='';S.newComment='';render();};}
    if(a==='closeModal'){el.onclick=()=>{S.modal=null;S.form={};render();};}
    if(a==='openBook'){el.onclick=()=>{S.modal='book';S.form={};render();};}
    if(a==='openMember'){el.onclick=()=>{S.modal='member';S.form={};render();};}
    if(a==='openLogin'){el.onclick=()=>{S.modal='auth';render();};}
    if(a==='goMyList'){el.onclick=()=>switchTab(tabIndex('আমার তালিকা'));}
    if(a.startsWith('tab:')){el.onclick=()=>switchTab(parseInt(a.split(':')[1]));}
    if(a.startsWith('return:')){el.onclick=()=>returnBorrow(a.split(':')[1]);}
    if(a.startsWith('delBook:')){el.onclick=()=>deleteBook(a.split(':')[1]);}
    if(a.startsWith('editBook:')){el.onclick=()=>editBook(a.split(':')[1]);}
    if(a.startsWith('delMember:')){el.onclick=()=>deleteMember(a.split(':')[1]);}
    if(a.startsWith('editMember:')){el.onclick=()=>editMember(a.split(':')[1]);}
    if(a.startsWith('delPass:')){el.onclick=()=>removePass(decodeURIComponent(a.split(':')[1]));}
    if(a.startsWith('markRead:')){el.onclick=()=>markComplaintRead(a.split(':')[1]);}
    if(a.startsWith('delComplaint:')){el.onclick=()=>deleteComplaint(a.split(':')[1]);}
    if(a.startsWith('openBookDetail:')){el.onclick=()=>{
      _tabSwitched=true;
      const id=a.split(':')[1];
      S.selectedBook={id,...S.books[id]};
      S.newRating=0;S.newReview='';S.newComment='';
      window.scrollTo(0,0);
      render();
    };}
    if(a.startsWith('toggleReadlist:')){el.onclick=()=>toggleReadlist(a.split(':')[1]);}
    if(a.startsWith('toggleFav:')){el.onclick=()=>toggleFav(a.split(':')[1]);}
    if(a==='authTabLogin'){el.onclick=()=>{S.authTab='login';S.authForm={};render();};}
    if(a==='authTabRegister'){el.onclick=()=>{S.authTab='register';S.authForm={};render();};}
  });
  document.querySelectorAll('[data-star]').forEach(el=>{el.onclick=()=>{S.newRating=parseInt(el.dataset.star);render();};});
  const bind=(sel,fn)=>{const el=document.querySelector(sel);if(el)el.oninput=fn;};
  bind('#adminPwField',e=>{S.adminPwInput=e.target.value;});
  bind('#fTitle',e=>{S.form.title=e.target.value;});
  bind('#fAuthor',e=>{S.form.author=e.target.value;});
  bind('#fCat',e=>{S.form.cat=e.target.value;});
  bind('#fTotal',e=>{S.form.total=e.target.value;});
  bind('#fIsbn',e=>{S.form.isbn=e.target.value;});
  bind('#fShelf',e=>{S.form.shelf=e.target.value;});
  bind('#fCoverUrl',e=>{S.form.coverUrl=e.target.value;});
  bind('#fName',e=>{S.form.name=e.target.value;});
  bind('#fPhone',e=>{S.form.phone=e.target.value;});
  bind('#fAddress',e=>{S.form.address=e.target.value;});
  bind('#fJoinedAt',e=>{S.form.joinedAt=e.target.value;});
  bind('#fNewPass',e=>{S.form.newPass=e.target.value;});
  bind('#authName',e=>{S.authForm.name=e.target.value;});
  bind('#authEmail',e=>{S.authForm.email=e.target.value;});
  bind('#authPassword',e=>{S.authForm.password=e.target.value;});
  bind('#newReviewText',e=>{S.newReview=e.target.value;});
  bind('#newCommentText',e=>{S.newComment=e.target.value;});
  bind('#complaintInput',e=>{S.complaintText=e.target.value;});
  bind('#searchCat',e=>{S.searchCat=e.target.value;render();});
  const gsEl=document.getElementById('globalSearch');
  if(gsEl){gsEl.oninput=e=>{S.search=e.target.value;};gsEl.onblur=e=>{S.search=e.target.value;render();};}
  bind('#bkQuery',e=>{S.borrow.bookQuery=e.target.value;S.ui.dropBook=true;if(!e.target.value){S.borrow.bookId='';S.borrow.bookTitle='';}render();});
  bind('#mbQuery',e=>{S.borrow.memberQuery=e.target.value;S.ui.dropMember=true;if(!e.target.value){S.borrow.memberId='';S.borrow.memberName='';}render();});
  const apf=document.getElementById('adminPwField');
  if(apf)apf.onkeydown=e=>{if(e.key==='Enter')tryAdminLogin();if(e.key==='Escape')closeAdminLogin();};
  document.addEventListener('click',e=>{
    if(!e.target.closest('#bkDropWrap')&&S.ui.dropBook){S.ui.dropBook=false;render();}
    if(!e.target.closest('#mbDropWrap')&&S.ui.dropMember){S.ui.dropMember=false;render();}
  },{once:true});
}

/* ── APP SHELL ── */
function renderApp(){
  const isAdmin=S.role==='admin';
  const isUser=S.role==='user'||isAdmin;
  const tabs=getTabList();

  // Header right side — no logout here, no text labels beyond icon+dot
  let hRight='';
  if(isUser){
    // Avatar button → goes to My List tab
    const photo=S.user?.photoURL;
    const name=S.user?.displayName||'?';
    let avHTML;
    if(photo){
      avHTML='<img src="'+esc(photo)+'" width="34" height="34" referrerpolicy="no-referrer" onerror="this.outerHTML=\'<div class=av-ph>'+name.charAt(0).toUpperCase()+'</div>\'" alt="">';
    } else {
      avHTML='<div class="av-ph">'+name.charAt(0).toUpperCase()+'</div>';
    }
    hRight='<button class="h-avatar-btn" data-action="goMyList" title="আমার তালিকা">'+avHTML+'</button>';
    hRight+='<span class="sync-dot '+(S.syncLive?'live':'')+'"></span>';
  } else {
    hRight='<button class="btn-login-pro" data-action="openLogin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>লগইন</button>';
    hRight+='<span class="sync-dot '+(S.syncLive?'live':'')+'"></span>';
  }

  return '<div class="header">'
    +'<div class="h-top"><div class="h-brand" title="৩ বার ট্যাপ (Admin)"><div class="h-logo">'+LOGO_SVG+'</div><div class="h-name">দিগন্ত পাঠাগার</div></div>'
    +'<div class="h-right">'+hRight+'</div></div>'
    +'<div class="h-nav"><div class="h-nav-inner">'+tabs.map((t,i)=>'<button class="nav-btn '+(S.tab===i?'on':'')+'" data-action="tab:'+i+'">'+t+'</button>').join('')+'</div></div></div>'
    +'<div class="main">'+(S.selectedBook?renderBookDetail():renderTab())+'</div>'
    +(S.modal?renderModal():'')+(S.showAdminLogin?renderAdminOverlay():'');
}

function renderTab(){
  const isAdmin=S.role==='admin';const isUser=S.role==='user'||isAdmin;
  const tabs=getTabList();
  const name=tabs[S.tab]||'';
  if(name==='ড্যাশবোর্ড')return renderDash();
  if(name==='বইয়ের তালিকা')return renderBooks();
  if(name==='অনুসন্ধান')return renderSearch();
  if(name==='আমার তালিকা')return renderMyList();
  if(name==='সদস্যবৃন্দ')return renderMembers();
  if(name==='বই ধার')return renderBorrow();
  if(name==='অভিযোগ')return renderComplaints();
  if(name==='সেটিংস')return renderSettings();
  return'';
}

function renderAdminOverlay(){
  return'<div class="modal-overlay" onclick="if(event.target===this)closeAdminLogin()"><div class="modal-box"><div class="modal-head"><span class="modal-title">অ্যাডমিন লগইন</span><button class="modal-close" data-action="closeAdminLogin">✕</button></div><input id="adminPwField" class="inp" type="password" placeholder="পাসওয়ার্ড লিখুন..."><button class="btn btn-dark" style="width:100%;justify-content:center;margin-bottom:8px" data-action="tryAdminLogin">লগইন করুন →</button><button class="btn btn-ghost" style="width:100%;justify-content:center" data-action="closeAdminLogin">বাতিল</button><div style="font-size:11px;color:var(--lighter);text-align:center;margin-top:12px">🔒 Logo তে ৩ বার ট্যাপ বা Ctrl+Shift+A</div></div></div>';
}

function renderDash(){
  const books=booksArr(),borrows=borrowsArr();
  const pending=borrows.filter(b=>!b.ret).length;
  const recent=borrows.slice(-6).reverse();
  const topBooks=booksArr().filter(b=>avgRating(b.id)>0).sort((a,b)=>avgRating(b.id)-avgRating(a.id)).slice(0,4);
  return'<div class="stats"><div class="stat-card"><div class="stat-icon si-gold">📚</div><div><div class="stat-val">'+books.length+'</div><div class="stat-lbl">মোট বই</div></div></div><div class="stat-card"><div class="stat-icon si-blue">👥</div><div><div class="stat-val">'+Object.keys(S.members).length+'</div><div class="stat-lbl">সদস্য</div></div></div><div class="stat-card"><div class="stat-icon si-red">⏳</div><div><div class="stat-val">'+pending+'</div><div class="stat-lbl">ধারে আছে</div></div></div><div class="stat-card"><div class="stat-icon si-green">✅</div><div><div class="stat-val">'+books.reduce((a,b)=>a+b.avail,0)+'</div><div class="stat-lbl">পাওয়া যাচ্ছে</div></div></div></div>'+(topBooks.length?'<div class="card"><div class="card-title">⭐ সেরা রেটিং প্রাপ্ত বই</div><div class="book-grid">'+topBooks.map(b=>bookCardHTML(b))+'</div></div>':'')+'<div class="card"><div class="card-title">সাম্প্রতিক কার্যক্রম <span style="font-size:12px;color:var(--muted);font-weight:400">🔴 Live</span></div>'+(recent.length?recent.map(b=>'<div class="activity-item"><div class="act-dot" style="background:'+(b.ret?'var(--green)':'var(--blue)')+'"></div><div class="act-text"><b>'+esc(b.bookTitle)+'</b> — '+esc(b.memberName)+'</div><span class="badge '+(b.ret?'bg-green':'bg-blue')+'">'+(b.ret?'ফেরত':'ধারে')+'</span></div>').join(''):'<div class="empty">এখনো কোনো কার্যক্রম নেই</div>')+'</div>';
}

function bookCoverHTML(b,height=120){
  if(b.cover&&b.cover.trim()){
    return'<div class="book-cover" style="height:'+height+'px"><img src="'+esc(b.cover)+'" alt="'+esc(b.title)+'" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML=\'<span class=book-cover-placeholder>📖</span>\'"></div>';
  }
  return'<div class="book-cover" style="height:'+height+'px"><span class="book-cover-placeholder">📖</span></div>';
}

function bookCardHTML(b,showAdminBtns=false){
  const avg=avgRating(b.id);
  const rv=S.reviews[b.id]||{};
  return'<div class="book-card" data-action="openBookDetail:'+b.id+'">'+bookCoverHTML(b)+'<div class="book-title">'+esc(b.title)+'</div><div class="book-author">'+esc(b.author)+'</div><div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap"><span class="badge bg-gray" style="font-size:10px">'+esc(b.cat)+'</span><span class="badge '+(b.avail>0?'bg-green':'bg-red')+'" style="font-size:10px">'+(b.avail>0?b.avail+' কপি':'শেষ')+'</span></div>'+(avg>0?'<div class="rating-bar" style="margin-top:6px">'+starsHTML(avg)+'<span class="rating-count">('+Object.keys(rv).length+')</span></div>':'')+(showAdminBtns?'<div class="btn-grp" style="margin-top:8px" onclick="event.stopPropagation()"><button class="btn btn-blue btn-sm" data-action="editBook:'+b.id+'">✏️</button><button class="btn btn-ghost btn-sm" data-action="delBook:'+b.id+'">🗑️</button></div>':'')+'</div>';
}

function renderBooks(){
  const isAdmin=S.role==='admin';
  const q=S.search.toLowerCase().trim();
  const list=booksArr().filter(b=>!q||(b.title+b.author+b.cat).toLowerCase().includes(q));
  return'<div class="section-head"><div class="search-wrap"><span class="search-icon">🔍</span><input id="globalSearch" class="inp search-inp" placeholder="বই, লেখক বা বিভাগ..." value="'+esc(S.search)+'" style="margin-bottom:0"></div>'+(isAdmin?'<button class="btn btn-dark" data-action="openBook">+ নতুন বই</button>':'')+'</div><div class="book-grid">'+(list.length?list.map(b=>bookCardHTML(b,isAdmin)).join(''):'<div class="card" style="grid-column:1/-1"><div class="empty">কোনো বই পাওয়া যায়নি</div></div>')+'</div>';
}

function renderBookDetail(){
  const b=S.selectedBook;if(!b)return'';
  const avg=avgRating(b.id);
  const rv=S.reviews[b.id]||{};
  const rvList=Object.entries(rv).map(([k,v])=>({k,...v}));
  const disc=S.discussions[b.id]||{};
  const discList=Object.entries(disc).map(([k,v])=>({k,...v})).reverse();
  const isUser=S.role==='user'||S.role==='admin';
  const uid=S.user?safeKey(S.user.uid):null;
  const myReview=uid&&rv[uid];
  const inRL=S.myReadlist[b.id];
  const inFav=S.myFavs[b.id];
  const coverLarge=b.cover?'<img src="'+esc(b.cover)+'" style="width:100px;height:140px;object-fit:cover;border-radius:10px;border:1px solid var(--border)" referrerpolicy="no-referrer" onerror="this.outerHTML=\'<div style=width:100px;height:140px;background:linear-gradient(135deg,var(--ink2),var(--ink3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:40px>📖</div>\'">':'<div style="width:100px;height:140px;background:linear-gradient(135deg,var(--ink2),var(--ink3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:40px">📖</div>';
  return'<button class="btn btn-ghost btn-sm" data-action="backFromBook" style="margin-bottom:16px">← ফিরে যান</button><div class="card"><div style="display:flex;gap:20px;flex-wrap:wrap">'+coverLarge+'<div style="flex:1"><h2 style="font-family:\'Libre Baskerville\',serif;font-size:20px;color:var(--text);margin-bottom:6px">'+esc(b.title)+'</h2><div style="font-size:14px;color:var(--muted);margin-bottom:8px">'+esc(b.author)+'</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"><span class="badge bg-gray">'+esc(b.cat)+'</span><span class="badge '+(b.avail>0?'bg-green':'bg-red')+'">'+(b.avail>0?b.avail+' কপি আছে':'অনুপলব্ধ')+'</span>'+(b.shelf?'<span class="badge bg-amber">তাক: '+esc(b.shelf)+'</span>':'')+'</div>'+(avg>0?'<div class="rating-bar">'+starsHTML(avg)+'<span style="font-size:13px;color:var(--muted);margin-left:4px">'+avg.toFixed(1)+' ('+rvList.length+' রিভিউ)</span></div>':'<div style="font-size:13px;color:var(--lighter)">এখনো কোনো রেটিং নেই</div>')+(isUser?'<div class="btn-grp" style="margin-top:12px"><button class="btn '+(inRL?'btn-gold':'btn-ghost')+' btn-sm" data-action="toggleReadlist:'+b.id+'">'+(inRL?'📚 তালিকায় আছে':'+ পড়ার তালিকা')+'</button><button class="btn '+(inFav?'btn-gold':'btn-ghost')+' btn-sm" data-action="toggleFav:'+b.id+'">'+(inFav?'❤️ প্রিয়তে আছে':'♡ প্রিয় তালিকা')+'</button></div>':'<button class="btn btn-ghost btn-sm" data-action="openLogin" style="margin-top:12px">লগইন করে তালিকায় যোগ করুন</button>')+'</div></div></div><div class="card"><div class="card-title">⭐ রিভিউ ও রেটিং</div>'+(isUser&&!myReview?'<div style="margin-bottom:16px;padding:16px;background:var(--cream);border-radius:10px;border:1px solid var(--border)"><div style="font-size:13px;color:var(--muted);margin-bottom:8px">আপনার রেটিং:</div>'+starsHTML(0,true)+'<textarea id="newReviewText" class="inp" rows="3" placeholder="রিভিউ লিখুন..." style="margin-top:10px;resize:vertical">'+esc(S.newReview)+'</textarea><button class="btn btn-dark btn-sm" data-action="submitReview">রিভিউ দিন</button></div>':'')+(myReview?'<div style="padding:10px;background:var(--green-bg);border-radius:8px;margin-bottom:12px;font-size:13px;color:var(--green)">✓ আপনি ইতোমধ্যে রিভিউ দিয়েছেন</div>':'')+(rvList.length?rvList.map(r=>'<div style="padding:12px;border-radius:10px;background:var(--cream);border:1px solid var(--border);margin-bottom:8px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:600;color:var(--blue)">'+esc(r.userName)+'</span>'+starsHTML(r.rating)+'</div><div style="font-size:14px">'+esc(r.text)+'</div><div style="font-size:11px;color:var(--lighter);margin-top:4px">'+esc(r.createdAt)+'</div></div>').join(''):'<div class="empty">এখনো কোনো রিভিউ নেই</div>')+'</div><div class="card"><div class="card-title">💬 আলোচনা</div>'+(isUser?'<div style="display:flex;gap:8px;margin-bottom:16px"><textarea id="newCommentText" class="inp" rows="2" placeholder="মন্তব্য লিখুন..." style="margin-bottom:0;resize:none;flex:1">'+esc(S.newComment)+'</textarea><button class="btn btn-dark btn-sm" data-action="submitComment" style="align-self:flex-end">পাঠান</button></div>':'<div style="font-size:13px;color:var(--muted);margin-bottom:12px;padding:10px;background:var(--blue-bg);border-radius:8px">💬 মন্তব্য করতে <button class="btn btn-blue btn-sm" data-action="openLogin">লগইন করুন</button></div>')+(discList.length?discList.map(c=>'<div class="comment-item"><div class="comment-user">'+esc(c.userName)+'</div><div class="comment-text">'+esc(c.text)+'</div><div class="comment-time">'+esc(c.createdAt)+'</div></div>').join(''):'<div class="empty">এখনো কোনো আলোচনা নেই</div>')+'</div>';

function renderSearch(){
  const q=S.search.toLowerCase().trim(),cat=S.searchCat;
  const books=booksArr().filter(b=>(!q||(b.title+b.author).toLowerCase().includes(q))&&(!cat||b.cat===cat));
  return'<div class="card"><div class="card-title">বই অনুসন্ধান</div><div class="inp-row"><div class="search-wrap" style="max-width:100%"><span class="search-icon">🔍</span><input id="globalSearch" class="inp search-inp" placeholder="নাম বা লেখক..." value="'+esc(S.search)+'" style="margin-bottom:0"></div><select id="searchCat" class="inp" style="margin-bottom:0"><option value="">সব বিভাগ</option>'+CATS.map(c=>'<option value="'+c+'" '+(S.searchCat===c?'selected':'')+'>'+c+'</option>').join('')+'</select></div></div>'+(q||cat?'<div class="book-grid">'+(books.length?books.map(b=>bookCardHTML(b)).join(''):'<div class="card" style="grid-column:1/-1"><div class="empty">কোনো বই পাওয়া যায়নি</div></div>')+'</div>':'<div class="card"><div class="empty">উপরে লিখুন বা বিভাগ বেছে নিন...</div></div>');
}

  const isEmailAdmin=S.user&&isAdminEmail(S.user.email);
  const isPwAdmin=isAdmin&&!isEmailAdmin;
  const readBooks=booksArr().filter(b=>S.myReadlist[b.id]);
  const favBooks=booksArr().filter(b=>S.myFavs[b.id]);

    '<img src="'+esc(S.user.photoURL)+'" class="profile-avatar" referrerpolicy="no-referrer" onerror="this.outerHTML=\'<div class=profile-avatar-placeholder>'+((S.user.displayName||'?').charAt(0).toUpperCase())+'</div>\'">':

    +'<div style="margin-top:6px"><span class="profile-role">'+(isAdmin?'⚙ অ্যাডমিন':'👤 সাধারণ সদস্য')+'</span></div>'

    +'<button class="btn-profile-action btn-profile-logout" data-action="logout">🚪 লগআউট</button>'

    +'<div class="card"><div class="card-title">📚 পড়ার তালিকা <span class="badge bg-blue">'+readBooks.length+'</span></div>'+(readBooks.length?'<div class="book-grid">'+readBooks.map(b=>'<div class="book-card" data-action="openBookDetail:'+b.id+'">'+bookCoverHTML(b)+'<div class="book-title">'+esc(b.title)+'</div><div class="book-author">'+esc(b.author)+'</div><button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%;justify-content:center" data-action="toggleReadlist:'+b.id+'" onclick="event.stopPropagation()">বাদ দিন</button></div>').join('')+'</div>':'<div class="empty">পড়ার তালিকা খালি</div>')+'</div>'
    +'<div class="card"><div class="card-title">❤️ প্রিয় বই <span class="badge bg-red">'+favBooks.length+'</span></div>'+(favBooks.length?'<div class="book-grid">'+favBooks.map(b=>'<div class="book-card" data-action="openBookDetail:'+b.id+'">'+bookCoverHTML(b)+'<div class="book-title">'+esc(b.title)+'</div><div class="book-author">'+esc(b.author)+'</div><button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%;justify-content:center" data-action="toggleFav:'+b.id+'" onclick="event.stopPropagation()">বাদ দিন</button></div>').join('')+'</div>':'<div class="empty">প্রিয় তালিকা খালি</div>')+'</div>';
}

function renderMembers(){
  const isAdmin=S.role==='admin';
  const q=S.search.toLowerCase().trim();
  const list=membersArr().filter(m=>!q||(m.name+m.phone).toLowerCase().includes(q));
  return'<div class="section-head"><div class="search-wrap"><span class="search-icon">🔍</span><input id="globalSearch" class="inp search-inp" placeholder="নাম বা ফোন..." value="'+esc(S.search)+'" style="margin-bottom:0"></div>'+(isAdmin?'<button class="btn btn-dark" data-action="openMember">+ নতুন সদস্য</button>':'')+'</div>'+(list.length?list.map(m=>{const cnt=memberBorrowCount(m.id);return'<div class="card" style="margin-bottom:12px;padding:16px"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px"><div style="flex:1"><div style="font-weight:700;font-size:15px">'+esc(m.name)+'</div><div style="font-size:13px;color:var(--muted);margin-top:3px">📞 '+esc(m.phone)+'</div>'+(m.address?'<div style="font-size:13px;color:var(--muted);margin-top:2px">📍 '+esc(m.address)+'</div>':'')+'<div style="font-size:12px;color:var(--lighter);margin-top:4px">যোগ দিয়েছেন: '+esc(m.joinedAt||'')+'</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px"><span class="badge '+(cnt>0?'bg-amber':'bg-green')+'">'+cnt+' টি ধারে</span>'+(isAdmin?'<div class="btn-grp"><button class="btn btn-blue btn-sm" data-action="editMember:'+m.id+'">✏️</button><button class="btn btn-ghost btn-sm" data-action="delMember:'+m.id+'">🗑️</button></div>':'')+'</div></div></div>';}).join(''):'<div class="card"><div class="empty">কোনো সদস্য নেই</div></div>');
}

function renderBorrow(){
  const pending=borrowsArr().filter(b=>!b.ret);
  const done=borrowsArr().filter(b=>b.ret).slice(-20).reverse();
  const bkQ=S.borrow.bookQuery.toLowerCase();
  const bkList=booksArr().filter(b=>b.avail>0&&(!bkQ||b.title.toLowerCase().includes(bkQ)));
  const mbQ=S.borrow.memberQuery.toLowerCase();
  const mbList=membersArr().filter(m=>!mbQ||m.name.toLowerCase().includes(mbQ)||m.phone.includes(mbQ));
  return'<div class="card"><div class="card-title">বই ধার দিন</div><div class="borrow-section"><div><label style="font-size:12px;color:var(--muted);margin-bottom:5px;display:block">বই নির্বাচন</label><div class="drop-wrap" id="bkDropWrap"><input id="bkQuery" class="inp" placeholder="বইয়ের নাম লিখুন..." value="'+esc(S.borrow.bookQuery)+'" style="margin-bottom:0">'+(S.ui.dropBook&&bkList.length?'<div class="drop-list">'+bkList.map(b=>'<div class="drop-item" onclick="selectBook(\''+b.id+'\',\''+esc(b.title)+'\')">'+esc(b.title)+' ('+b.avail+' কপি)</div>').join('')+'</div>':'')+(S.borrow.bookTitle?'<div style="margin-top:6px"><span class="badge bg-green">✓ '+esc(S.borrow.bookTitle)+'</span></div>':'')+'</div></div><div><label style="font-size:12px;color:var(--muted);margin-bottom:5px;display:block">সদস্য নির্বাচন</label><div class="drop-wrap" id="mbDropWrap"><input id="mbQuery" class="inp" placeholder="সদস্যের নাম লিখুন..." value="'+esc(S.borrow.memberQuery)+'" style="margin-bottom:0">'+(S.ui.dropMember&&mbList.length?'<div class="drop-list">'+mbList.map(m=>'<div class="drop-item" onclick="selectMember(\''+m.id+'\',\''+esc(m.name)+'\')">'+esc(m.name)+' ('+m.phone+')</div>').join('')+'</div>':'')+(S.borrow.memberName?'<div style="margin-top:6px"><span class="badge bg-blue">✓ '+esc(S.borrow.memberName)+'</span></div>':'')+'</div></div></div><div style="display:flex;align-items:center;gap:12px;margin-top:6px"><label style="font-size:13px;color:var(--muted)">ফেরতের মেয়াদ:</label><select id="dueDays" class="inp" style="width:auto;margin-bottom:0"><option value="7">৭ দিন</option><option value="14" selected>১৪ দিন</option><option value="21">২১ দিন</option><option value="30">৩০ দিন</option></select></div><button class="btn btn-dark" style="width:100%;margin-top:14px;justify-content:center" data-action="issueBorrow">ধার নিশ্চিত করুন →</button></div><div class="card"><div class="card-title">পেন্ডিং ধার <span class="badge bg-red">'+pending.length+'</span></div><table class="tbl"><thead><tr><th>বই</th><th>সদস্য</th><th>ইস্যু</th><th>ফেরত</th><th></th></tr></thead><tbody>'+(pending.length?pending.map(b=>'<tr><td style="font-weight:600">'+esc(b.bookTitle)+'</td><td>'+esc(b.memberName)+'</td><td style="font-size:13px;color:var(--muted)">'+esc(b.issuedAt)+'</td><td style="font-size:13px;color:var(--muted)">'+esc(b.dueDate||'—')+'</td><td><button class="btn btn-gold btn-sm" data-action="return:'+b.id+'">ফেরত নিন</button></td></tr>').join(''):'<tr><td colspan="5" class="empty">কোনো পেন্ডিং নেই</td></tr>')+'</tbody></table></div><div class="card"><div class="card-title">ফেরত দেওয়া হয়েছে</div><table class="tbl"><thead><tr><th>বই</th><th>সদস্য</th><th>ইস্যু</th><th>ফেরত</th></tr></thead><tbody>'+(done.length?done.map(b=>'<tr><td>'+esc(b.bookTitle)+'</td><td>'+esc(b.memberName)+'</td><td style="font-size:13px;color:var(--muted)">'+esc(b.issuedAt)+'</td><td style="font-size:13px;color:var(--muted)">'+esc(b.returnedAt||'—')+'</td></tr>').join(''):'<tr><td colspan="4" class="empty">কোনো রেকর্ড নেই</td></tr>')+'</tbody></table></div>';
}

function renderComplaints(){
  const isAdmin=S.role==='admin';
  const list=Object.entries(S.complaints).map(([id,v])=>({id,...v})).reverse();
  const unread=list.filter(c=>!c.read).length;
  if(!isAdmin)return'<div class="card"><div class="card-title">📢 অভিযোগ / পরামর্শ পাঠান</div><p style="font-size:13px;color:var(--muted);margin-bottom:14px">আপনার পরিচয় গোপন থাকবে।</p><textarea id="complaintInput" class="inp" rows="4" placeholder="এখানে লিখুন..." style="resize:vertical;min-height:100px">'+esc(S.complaintText||'')+'</textarea><button class="btn btn-dark" style="width:100%;justify-content:center" data-action="submitComplaint">পাঠান →</button></div><div class="card"><p style="font-size:13px;color:var(--muted);text-align:center">🔒 আপনার পরিচয় সম্পূর্ণ গোপন থাকবে।</p></div>';
  return'<div class="card"><div class="card-title">📢 অভিযোগ / পরামর্শ <span class="badge bg-red">'+unread+' নতুন</span></div>'+(list.length?list.map(c=>'<div style="padding:14px;border-radius:10px;background:'+(c.read?'var(--cream)':'var(--blue-bg)')+';border:1px solid '+(c.read?'var(--border)':'rgba(42,95,158,.2)')+';margin-bottom:10px"><div style="font-size:14px;color:var(--text);line-height:1.6">'+esc(c.text)+'</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><span style="font-size:12px;color:var(--muted)">'+esc(c.sentAt||'')+' '+(c.read?'<span class="badge bg-green">পড়া হয়েছে</span>':'<span class="badge bg-blue">নতুন</span>')+'</span><div class="btn-grp">'+(c.read?'':'<button class="btn btn-blue btn-sm" data-action="markRead:'+c.id+'">পড়া হয়েছে</button>')+'<button class="btn btn-ghost btn-sm" data-action="delComplaint:'+c.id+'">🗑️</button></div></div></div>').join(''):'<div class="empty">কোনো অভিযোগ নেই</div>')+'</div>';
}

function renderSettings(){
  const books=booksArr(),members=membersArr(),borrows=borrowsArr();
  const onlineList=Object.values(S.onlineUsers||{});
  const isEmailAdmin=S.user&&isAdminEmail(S.user.email);
  const isPwAdmin=S.role==='admin'&&!isEmailAdmin;

  const onlineSec='<div class="card"><div class="card-title">🟢 লগইনকৃত ব্যবহারকারী <span class="badge bg-green">'+onlineList.length+'</span></div>'
    +(onlineList.length?onlineList.map(u=>'<div class="logged-user-item">'
      +(u.photo?'<img src="'+esc(u.photo)+'" class="logged-user-av" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">'
        :'<div class="logged-user-av-p">'+(u.name||'?').charAt(0).toUpperCase()+'</div>')
      +'<div style="flex:1"><div style="font-weight:600;font-size:14px">'+esc(u.name||'অজানা')+'</div><div style="font-size:12px;color:var(--muted)">'+esc(u.email||'')+'</div></div>'
      +(u.isAdmin?'<span class="badge bg-amber">অ্যাডমিন</span>':'<span class="badge bg-blue">সদস্য</span>')
      +'</div>').join('')
    :'<div class="empty">কেউ লগইন নেই</div>')
    +'</div>';

  const adminEmailsSec='<div class="card"><div class="card-title">✉️ অনুমোদিত Admin ইমেইল</div>'
    +ADMIN_EMAILS.map(e=>'<div style="padding:10px 14px;border-radius:8px;background:var(--cream);border:1px solid var(--border);margin-bottom:6px;font-family:monospace;font-size:13px;color:var(--ink2)">'+esc(e)+'</div>').join('')
    +'<div style="font-size:12px;color:var(--muted);margin-top:10px">💡 ইমেইল পরিবর্তন করতে index.html এ ADMIN_EMAILS তালিকা সম্পাদনা করুন।</div></div>';

  // "Admin মোড বন্ধ" only for password-admin (email-admins have logout in My List)
  const adminExitBtn=isPwAdmin
    ?'<div class="card"><div class="card-title">অ্যাডমিন</div><button class="btn btn-ghost" data-action="adminExitMode" style="color:var(--red);border-color:var(--red)">Admin মোড বন্ধ করুন</button></div>'
    :'';

  return onlineSec+adminEmailsSec+adminExitBtn
    +'<div class="card"><div class="card-title">পাসওয়ার্ড ব্যবস্থাপনা</div><table class="tbl"><thead><tr><th>#</th><th>পাসওয়ার্ড</th><th></th></tr></thead><tbody>'+S.passes.map((p,i)=>'<tr><td style="color:var(--muted)">'+(i+1)+'</td><td><span style="font-family:monospace">'+'•'.repeat(Math.min(p.length,12))+'</span></td><td><button class="btn btn-ghost btn-sm" data-action="delPass:'+encodeURIComponent(p)+'">মুছুন</button></td></tr>').join('')+'</tbody></table><div style="display:flex;gap:10px;margin-top:16px"><input id="fNewPass" class="inp" style="margin-bottom:0;flex:1" type="password" placeholder="নতুন পাসওয়ার্ড" value="'+esc(S.form.newPass||'')+'"><button class="btn btn-dark" data-action="addPass">যোগ করুন</button></div></div>'
    +'<div class="card"><div class="card-title">পরিসংখ্যান</div><table class="tbl"><tbody><tr><td>মোট বই</td><td style="font-weight:700">'+books.length+'</td></tr><tr><td>মোট কপি</td><td style="font-weight:700">'+books.reduce((a,b)=>a+b.total,0)+'</td></tr><tr><td>মোট সদস্য</td><td style="font-weight:700">'+members.length+'</td></tr><tr><td>সর্বমোট ধার</td><td style="font-weight:700">'+borrows.length+' বার</td></tr><tr><td>এখন ধারে</td><td style="font-weight:700">'+borrows.filter(b=>!b.ret).length+'</td></tr></tbody></table></div>';
}

function renderModal(){
  let content='';
  if(S.modal==='auth'){
    content='<div class="modal-head"><span class="modal-title">দিগন্ত পাঠাগারে প্রবেশ</span><button class="modal-close" data-action="closeModal">✕</button></div><div class="auth-tab"><button class="auth-tab-btn '+(S.authTab==='login'?'on':'')+'" data-action="authTabLogin">লগইন</button><button class="auth-tab-btn '+(S.authTab==='register'?'on':'')+'" data-action="authTabRegister">রেজিস্ট্রেশন</button></div><button class="btn-google" data-action="googleLogin">'+GOOGLE_SVG+' Google দিয়ে প্রবেশ করুন</button><div class="divider">অথবা</div>'+(S.authTab==='register'?'<input id="authName" class="inp" placeholder="আপনার নাম *" value="'+esc(S.authForm.name||'')+'">':'')+'<input id="authEmail" class="inp" type="email" placeholder="ইমেইল *" value="'+esc(S.authForm.email||'')+'"><input id="authPassword" class="inp" type="password" placeholder="পাসওয়ার্ড *" value="'+esc(S.authForm.password||'')+'"><button class="btn btn-dark" style="width:100%;justify-content:center" data-action="'+(S.authTab==='login'?'emailLogin':'emailRegister')+'">'+(S.authTab==='login'?'লগইন করুন →':'অ্যাকাউন্ট তৈরি করুন →')+'</button>';
  } else if(S.modal==='book'){
    const isEdit=!!S.form.editId;
    const previewHtml=S.form.coverUrl?'<div style="margin-bottom:10px"><img src="'+esc(S.form.coverUrl)+'" style="height:80px;border-radius:6px;border:1px solid var(--border)" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'"><div style="font-size:11px;color:var(--muted);margin-top:4px">ছবির প্রিভিউ</div></div>':'';
    content='<div class="modal-head"><span class="modal-title">'+(isEdit?'বই এডিট':'নতুন বই যোগ')+'</span><button class="modal-close" data-action="closeModal">✕</button></div><input id="fTitle" class="inp" placeholder="বইয়ের নাম *" value="'+esc(S.form.title||'')+'"><input id="fAuthor" class="inp" placeholder="লেখকের নাম" value="'+esc(S.form.author||'')+'"><select id="fCat" class="inp"><option value="">বিভাগ *</option>'+CATS.map(c=>'<option value="'+c+'" '+(S.form.cat===c?'selected':'')+'>'+c+'</option>').join('')+'</select><div class="inp-row"><input id="fTotal" class="inp" type="number" min="1" placeholder="কপি সংখ্যা" value="'+esc(S.form.total||'')+'"><input id="fShelf" class="inp" placeholder="তাক নং" value="'+esc(S.form.shelf||'')+'"></div><input id="fIsbn" class="inp" placeholder="ISBN (ঐচ্ছিক)" value="'+esc(S.form.isbn||'')+'">'+previewHtml+'<input id="fCoverUrl" class="inp" placeholder="বইয়ের ছবির URL (ঐচ্ছিক)" value="'+esc(S.form.coverUrl||'')+'" style="font-size:12px"><div style="font-size:11px;color:var(--muted);margin-top:-6px;margin-bottom:10px">💡 Google Images বা অন্য সাইট থেকে ছবির লিংক কপি করে এখানে দিন</div><div class="modal-foot"><button class="btn btn-dark" data-action="saveBook">'+(isEdit?'আপডেট':'সংরক্ষণ')+'</button><button class="btn btn-ghost" data-action="closeModal">বাতিল</button></div>';
  } else if(S.modal==='member'){
    const isEdit=!!S.form.editId;
    content='<div class="modal-head"><span class="modal-title">'+(isEdit?'সদস্য এডিট':'নতুন সদস্য')+'</span><button class="modal-close" data-action="closeModal">✕</button></div><input id="fName" class="inp" placeholder="নাম *" value="'+esc(S.form.name||'')+'"><input id="fPhone" class="inp" placeholder="ফোন *" value="'+esc(S.form.phone||'')+'"><input id="fAddress" class="inp" placeholder="ঠিকানা" value="'+esc(S.form.address||'')+'">'+(isEdit?'<input id="fJoinedAt" class="inp" placeholder="যোগদানের তারিখ" value="'+esc(S.form.joinedAt||'')+'">':'')+'<div class="modal-foot"><button class="btn btn-dark" data-action="saveMember">'+(isEdit?'আপডেট':'সংরক্ষণ')+'</button><button class="btn btn-ghost" data-action="closeModal">বাতিল</button></div>';
  }
  return'<div class="modal-overlay" onclick="if(event.target===this){S.modal=null;S.form={};render();}"><div class="modal-box">'+content+'</div></div>';
}

window.selectBook=function(id,title){S.borrow.bookId=id;S.borrow.bookTitle=title;S.borrow.bookQuery=title;S.ui.dropBook=false;render();};
window.selectMember=function(id,name){S.borrow.memberId=id;S.borrow.memberName=name;S.borrow.memberQuery=name;S.ui.dropMember=false;render();};

window.addEventListener('online',()=>document.getElementById('offlineBar').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offlineBar').classList.add('show'));

// ── Pull-to-refresh prevention ──
let touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{
  if(e.touches[0].clientY>touchStartY&&window.scrollY===0){
    e.preventDefault();
  }
},{passive:false});

if(window._fbReady)initListeners();
else window.addEventListener('fbReady',initListeners);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/Diganta-Pathagar/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
