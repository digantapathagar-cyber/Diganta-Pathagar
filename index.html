<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1a2e;--ink2:#16213e;--ink3:#0f3460;
  --gold:#c9a84c;--gold2:#a07c30;--gold3:#e8c97a;
  --cream:#f5f0e8;--cream2:#ede6d6;--cream3:#d4c9b0;
  --text:#2d2a22;--muted:#7a7060;--lighter:#a09880;
  --green:#2d7a52;--green-bg:#e8f5ee;
  --red:#b03030;--red-bg:#fceaea;
  --blue:#2a5f9e;--blue-bg:#e8f0fa;
  --border:#d4c9b0;--border2:#c0b498;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
  --shadow2:0 8px 40px rgba(0,0,0,0.13);
}
body{font-family:'Hind Siliguri',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px;}

/* SYNC */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-left:6px;transition:.3s;}
.sync-dot.live{background:#2ecc71;box-shadow:0 0 6px #2ecc71;}

/* TOAST */
.toast-wrap{position:fixed;top:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink2);color:var(--cream);padding:12px 20px;border-radius:10px;font-size:14px;animation:slideIn .25s ease;border-left:4px solid var(--gold);max-width:280px;}
.toast.err{border-left-color:#e05050;}
.toast.ok{border-left-color:var(--green);}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}

/* LOADING */
.fb-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--ink);gap:16px;}
.fb-loading .spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.fb-loading p{color:var(--gold3);font-size:14px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ADMIN LOGIN MODAL */
.admin-overlay{position:fixed;inset:0;background:rgba(10,15,35,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
.admin-card{background:var(--cream);border-radius:18px;padding:32px;width:360px;max-width:100%;box-shadow:var(--shadow2);}
.admin-title{font-family:'Libre Baskerville',serif;font-size:18px;color:var(--ink);margin-bottom:6px;}
.admin-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.admin-inp{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'Hind Siliguri',sans-serif;font-size:15px;color:var(--text);background:#fff;outline:none;transition:.2s;margin-bottom:12px;}
.admin-inp:focus{border-color:var(--gold2);}
.admin-btn{width:100%;border:none;border-radius:10px;padding:13px;font-family:'Hind Siliguri',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.admin-btn-primary{background:var(--ink2);color:var(--cream);margin-bottom:8px;}
.admin-btn-primary:hover{background:var(--ink3);}
.admin-btn-cancel{background:transparent;border:1.5px solid var(--border2);color:var(--muted);}
.admin-btn-cancel:hover{border-color:var(--red);color:var(--red);}
.admin-hint{font-size:11px;color:var(--lighter);text-align:center;margin-top:12px;}

/* HEADER */
.header{background:var(--ink2);border-bottom:1px solid rgba(201,168,76,.15);position:sticky;top:0;z-index:80;}
.h-top{max-width:1120px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.h-brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.h-logo{width:38px;height:38px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.h-logo:active{background:rgba(201,168,76,.25);}
.h-logo svg{width:24px;height:24px;}
.h-name{font-family:'Libre Baskerville',serif;font-size:17px;color:var(--gold3);letter-spacing:.3px;}
.h-actions{display:flex;align-items:center;gap:10px;}
.role-pill{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid rgba(201,168,76,.3);color:var(--gold3);background:rgba(201,168,76,.08);letter-spacing:.3px;display:flex;align-items:center;gap:4px;}
.admin-logout-btn{background:rgba(176,48,48,.15);border:1px solid rgba(176,48,48,.3);color:#e07070;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s;}
.admin-logout-btn:hover{background:rgba(176,48,48,.25);color:#ff9090;}
.h-nav{border-top:1px solid rgba(255,255,255,.05);}
.h-nav-inner{max-width:1120px;margin:0 auto;padding:0 24px;display:flex;gap:0;overflow-x:auto;}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-size:14px;color:rgba(255,255,255,.45);padding:12px 18px;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;}
.nav-btn:hover{color:rgba(255,255,255,.75);}
.nav-btn.on{color:var(--gold3);border-bottom-color:var(--gold);}

/* MAIN */
.main{max-width:1120px;margin:0 auto;padding:28px 24px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.si-gold{background:#fdf5e0;}.si-blue{background:var(--blue-bg);}.si-green{background:var(--green-bg);}.si-red{background:var(--red-bg);}
.stat-val{font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px;}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
.card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}

/* INPUTS */
.inp{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 14px;font-family:'Hind Siliguri',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;transition:.2s;margin-bottom:10px;}
.inp:focus{border-color:var(--gold2);}
select.inp{cursor:pointer;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.inp-row{grid-template-columns:1fr;}}

/* BUTTONS */
.btn{border:none;border-radius:9px;padding:10px 20px;font-family:'Hind Siliguri',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-dark{background:var(--ink2);color:var(--cream);}
.btn-dark:hover{background:var(--ink3);}
.btn-gold{background:var(--gold);color:#1a1a2e;}
.btn-gold:hover{background:var(--gold2);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:#1e4d8a;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--muted);}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink2);}
.btn-grp{display:flex;gap:6px;flex-wrap:wrap;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1.5px solid var(--border);padding:8px 12px;text-align:left;}
.tbl td{padding:12px;border-bottom:1px solid var(--cream2);font-size:14px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--cream);}
.empty{color:var(--lighter);font-size:14px;text-align:center;padding:32px;}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.bg-green{background:var(--green-bg);color:var(--green);}
.bg-blue{background:var(--blue-bg);color:var(--blue);}
.bg-red{background:var(--red-bg);color:var(--red);}
.bg-amber{background:#fdf5e0;color:#8a6200;}
.bg-gray{background:#f0ece4;color:var(--muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,20,40,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
.modal-box{background:var(--cream);border-radius:18px;padding:28px;width:440px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-size:17px;font-weight:700;color:var(--text);}
.modal-close{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;padding:2px 6px;}
.modal-close:hover{color:var(--red);}
.modal-foot{display:flex;gap:10px;margin-top:20px;}
.modal-foot .btn{flex:1;justify-content:center;}

/* DROPDOWN */
.drop-wrap{position:relative;margin-bottom:10px;}
.drop-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--gold2);border-top:none;border-radius:0 0 10px 10px;max-height:170px;overflow-y:auto;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.1);}
.drop-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--cream2);}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover{background:var(--cream);}

/* SEARCH */
.search-wrap{position:relative;flex:1;max-width:400px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);}
.search-inp{padding-left:36px !important;}

/* ACTIVITY */
.activity-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--cream2);}
.activity-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.act-text{font-size:14px;flex:1;}

/* BORROW */
.borrow-section{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:640px){.borrow-section{grid-template-columns:1fr;}}

/* MEMBER MODE BANNER */
.member-banner{background:var(--blue-bg);border:1px solid rgba(42,95,158,.2);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--blue);}

/* OFFLINE */
.offline-bar{background:#c0392b;color:#fff;text-align:center;padding:7px;font-size:13px;display:none;}
.offline-bar.show{display:block;}

.h-logo.tapped{background:rgba(201,168,76,.35) !important;}
</style>
</head>
<body>
<div class="offline-bar" id="offlineBar">📡 ইন্টারনেট সংযোগ নেই — offline mode</div>
<div id="app">
  <div class="fb-loading"><div class="spinner"></div><p>সংযোগ হচ্ছে...</p></div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
const CATS=["উপন্যাস","ছোটগল্প","কবিতা","নাটক","সায়েন্স ফিকশন","জীবনী","ইতিহাস","ধর্মীয়","প্রবন্ধ","শিশুসাহিত্য","বিজ্ঞান","অন্যান্য"];
const LOGO_SVG=`<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="26" width="30" height="4" rx="2" fill="#c9a84c"/><path d="M18 10 Q11 6 5 8 L5 22 Q11 20 18 24 Q25 20 31 22 L31 8 Q25 6 18 10Z" stroke="#c9a84c" stroke-width="1.4" fill="rgba(201,168,76,0.08)"/><line x1="18" y1="10" x2="18" y2="24" stroke="#c9a84c" stroke-width="1"/><circle cx="18" cy="8" r="2" fill="#c9a84c" opacity=".5"/></svg>`;

let S={
  screen:'loading',
  role:'member',
  tab:0,
  books:{}, members:{}, borrows:{}, passes:[],
  modal:null, form:{},
  borrow:{bookId:'',bookTitle:'',memberId:'',memberName:'',bookQuery:'',memberQuery:''},
  search:'', searchCat:'',
  ui:{dropBook:false,dropMember:false},
  showAdminLogin:false, adminPwInput:'',
  syncLive:false,
  logoTapCount:0, logoTapTimer:null,
  complaints:{}, complaintText:''
};

function fb(){return window._fb;}
function fbPush(p,v){const{db,ref,push}=fb();return push(ref(db,p),v);}
function fbRemove(p){const{db,ref,remove}=fb();return remove(ref(db,p));}
function fbUpdate(p,v){const{db,ref,update}=fb();return update(ref(db,p),v);}
function fbSet(p,v){const{db,ref,set}=fb();return set(ref(db,p),v);}
function fbListen(p,cb){const{db,ref,onValue}=fb();return onValue(ref(db,p),snap=>{cb(snap.exists()?snap.val():null);});}

function initListeners(){
  fbListen('books',v=>{S.books=v||{};if(S.screen==='app')render();});
  fbListen('members',v=>{S.members=v||{};if(S.screen==='app')render();});
  fbListen('borrows',v=>{S.borrows=v||{};if(S.screen==='app')render();});
  fbListen('complaints',v=>{S.complaints=v||{};if(S.screen==='app')render();});
  fbListen('passes',v=>{
    if(v){S.passes=typeof v==='object'?Object.values(v):v;}
    else{fbSet('passes',{p0:'diganta2025'});S.passes=['diganta2025'];}
    if(S.screen==='loading'){S.screen='app';render();}
    else if(S.screen==='app')render();
  });
  S.syncLive=true;
}

function toast(msg,type='ok'){
  const w=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;
  w.appendChild(el);setTimeout(()=>el.remove(),3500);
}

function handleLogoTap(){
  S.logoTapCount++;
  const logo=document.querySelector('.h-logo');
  if(logo){logo.classList.add('tapped');setTimeout(()=>logo.classList.remove('tapped'),200);}
  if(S.logoTapTimer)clearTimeout(S.logoTapTimer);
  S.logoTapTimer=setTimeout(()=>{S.logoTapCount=0;},1200);
  if(S.logoTapCount>=3){S.logoTapCount=0;openAdminLogin();}
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.shiftKey&&e.key==='A'){e.preventDefault();openAdminLogin();}
});

function openAdminLogin(){
  if(S.role==='admin')return;
  S.showAdminLogin=true;S.adminPwInput='';render();
  setTimeout(()=>{const f=document.getElementById('adminPwField');if(f)f.focus();},100);
}
function closeAdminLogin(){S.showAdminLogin=false;S.adminPwInput='';render();}
function tryAdminLogin(){
  const pw=S.adminPwInput.trim();
  if(!pw){toast('পাসওয়ার্ড দিন','err');return;}
  if(S.passes.includes(pw)){
    S.role='admin';S.showAdminLogin=false;S.adminPwInput='';
    toast('অ্যাডমিন হিসেবে প্রবেশ হয়েছে ✓');render();
  } else {
    toast('ভুল পাসওয়ার্ড!','err');
  }
}
function adminLogout(){S.role='member';S.tab=0;toast('অ্যাডমিন মোড বন্ধ');render();}

function saveBook(){
  const{title,author,cat,total,isbn,shelf,editId}=S.form;
  if(!title||!cat)return toast('বইয়ের নাম ও বিভাগ আবশ্যক','err');
  const tot=parseInt(total)||1;
  if(!editId){
    const dup=Object.values(S.books).find(b=>
      b.title.trim().toLowerCase()===title.trim().toLowerCase()&&
      (b.author||'').trim().toLowerCase()===(author||'').trim().toLowerCase()
    );
    if(dup){if(!confirm(`"${title}" নামে বই আগেই আছে!\nআবারও যোগ করবেন?`))return;}
  }
  if(editId){
    const old=S.books[editId];
    const diff=tot-(old.total||1);
    const newAvail=Math.max(0,(old.avail||0)+diff);
    fbUpdate('books/'+editId,{title,author:author||'অজানা লেখক',cat,total:tot,avail:newAvail,isbn:isbn||'',shelf:shelf||''})
      .then(()=>{S.modal=null;S.form={};toast('বই আপডেট হয়েছে');render();});
  } else {
    fbPush('books',{title,author:author||'অজানা লেখক',cat,total:tot,avail:tot,isbn:isbn||'',shelf:shelf||'',addedAt:nowDate()})
      .then(()=>{S.modal=null;S.form={};toast('বই যোগ হয়েছে');render();});
  }
}
function editBook(id){
  const b=S.books[id];
  S.form={editId:id,title:b.title,author:b.author||'',cat:b.cat,total:String(b.total),isbn:b.isbn||'',shelf:b.shelf||''};
  S.modal='book';render();
}
function deleteBook(id){
  const bk=S.books[id];
  if(Object.values(S.borrows).filter(b=>b.bookId===id&&!b.ret).length>0)return toast('বইটি ধারে আছে, মুছতে পারবেন না','err');
  if(!confirm(`"${bk.title}" মুছে দেবেন?`))return;
  fbRemove('books/'+id).then(()=>toast('বই মুছে গেছে'));
}

function saveMember(){
  const{name,phone,address,editId}=S.form;
  if(!name||!phone)return toast('নাম ও ফোন আবশ্যক','err');
  if(editId){
    const joinedAt=(S.form.joinedAt||'').trim();
    fbUpdate('members/'+editId,{name,phone,address:address||'',joinedAt:joinedAt||nowDate()})
      .then(()=>{S.modal=null;S.form={};toast('সদস্য আপডেট হয়েছে');render();});
  } else {
    if(Object.values(S.members).find(m=>m.phone===phone))return toast('এই ফোন নম্বর আগেই আছে','err');
    fbPush('members',{name,phone,address:address||'',joinedAt:nowDate(),active:true})
      .then(()=>{S.modal=null;S.form={};toast('সদস্য যোগ হয়েছে');render();});
  }
}
function editMember(id){
  const m=S.members[id];
  S.form={editId:id,name:m.name,phone:m.phone,address:m.address||'',joinedAt:m.joinedAt||''};
  S.modal='member';render();
}
function deleteMember(id){
  if(Object.values(S.borrows).filter(b=>b.memberId===id&&!b.ret).length>0)return toast('সদস্যের ধার পেন্ডিং আছে','err');
  if(!confirm('সদস্যকে মুছে দেবেন?'))return;
  fbRemove('members/'+id).then(()=>toast('সদস্য মুছে গেছে'));
}

function issueBorrow(){
  if(!S.borrow.bookId)return toast('বই সিলেক্ট করুন','err');
  if(!S.borrow.memberId)return toast('সদস্য সিলেক্ট করুন','err');
  const bk=S.books[S.borrow.bookId];
  if(!bk||bk.avail<1)return toast('বইটি পাওয়া যাচ্ছে না','err');
  const dueDays=parseInt(document.getElementById('dueDays')?.value)||14;
  fbPush('borrows',{
    bookId:S.borrow.bookId,bookTitle:S.borrow.bookTitle,
    memberId:S.borrow.memberId,memberName:S.borrow.memberName,
    issuedAt:nowDate(),dueDate:futureDate(dueDays),ret:false,returnedAt:null
  }).then(()=>{
    fbUpdate('books/'+S.borrow.bookId,{avail:bk.avail-1});
    S.borrow={bookId:'',bookTitle:'',memberId:'',memberName:'',bookQuery:'',memberQuery:''};
    toast('বই ধার দেওয়া হয়েছে');render();
  });
}
function returnBorrow(id){
  const rec=S.borrows[id];if(!rec)return;
  const bk=S.books[rec.bookId];
  fbUpdate('borrows/'+id,{ret:true,returnedAt:nowDate()}).then(()=>{
    if(bk)fbUpdate('books/'+rec.bookId,{avail:(bk.avail||0)+1});
    toast(`"${rec.bookTitle}" ফেরত নেওয়া হয়েছে`);
  });
}

function addPass(){
  const pw=(S.form.newPass||'').trim();
  if(pw.length<6)return toast('কমপক্ষে ৬ অক্ষর','err');
  if(S.passes.includes(pw))return toast('এই পাসওয়ার্ড আগেই আছে','err');
  fbPush('passes',pw).then(()=>{S.form.newPass='';toast('পাসওয়ার্ড যোগ হয়েছে');render();});
}
function removePass(pw){
  if(S.passes.length<=1)return toast('অন্তত একটি পাসওয়ার্ড রাখতে হবে','err');
  const{db,ref,onValue,remove:fbRem}=fb();
  onValue(ref(db,'passes'),snap=>{
    if(!snap.exists())return;
    for(const[k,v]of Object.entries(snap.val())){
      if(v===pw){fbRem(ref(db,'passes/'+k)).then(()=>toast('পাসওয়ার্ড মুছে গেছে'));break;}
    }
  },{onlyOnce:true});
}

function submitComplaint(){
  const txt=(S.complaintText||'').trim();
  if(!txt)return toast('অভিযোগ লিখুন','err');
  if(txt.length<5)return toast('একটু বিস্তারিত লিখুন','err');
  fbPush('complaints',{text:txt,sentAt:nowDate(),read:false})
    .then(()=>{S.complaintText='';toast('অভিযোগ পাঠানো হয়েছে ✓');render();});
}
function markComplaintRead(id){fbUpdate('complaints/'+id,{read:true});}
function deleteComplaint(id){
  if(!confirm('অভিযোগটি মুছে দেবেন?'))return;
  fbRemove('complaints/'+id).then(()=>toast('মুছে গেছে'));
}

function nowDate(){return new Date().toLocaleDateString('bn-BD',{day:'numeric',month:'long',year:'numeric'});}
function futureDate(days){const d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString('bn-BD',{day:'numeric',month:'long',year:'numeric'});}
function memberBorrowCount(mId){return Object.values(S.borrows).filter(b=>b.memberId===mId&&!b.ret).length;}
function booksArr(){return Object.entries(S.books).map(([id,v])=>({id,...v}));}
function membersArr(){return Object.entries(S.members).map(([id,v])=>({id,...v}));}
function borrowsArr(){return Object.entries(S.borrows).map(([id,v])=>({id,...v}));}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function render(){
  document.getElementById('app').innerHTML=
    S.screen==='loading'
      ?`<div class="fb-loading"><div class="spinner"></div><p>Firebase সংযোগ হচ্ছে...</p></div>`
      :renderApp();
  attachEvents();
}

function attachEvents(){
  const logo=document.querySelector('.h-brand');
  if(logo)logo.onclick=handleLogoTap;

  document.querySelectorAll('[data-action]').forEach(el=>{
    const a=el.dataset.action;
    if(a==='tryAdminLogin')el.onclick=tryAdminLogin;
    if(a==='closeAdminLogin')el.onclick=closeAdminLogin;
    if(a==='adminLogout')el.onclick=adminLogout;
    if(a==='saveBook')el.onclick=saveBook;
    if(a==='saveMember')el.onclick=saveMember;
    if(a==='issueBorrow')el.onclick=issueBorrow;
    if(a==='addPass')el.onclick=addPass;
    if(a==='closeModal'){el.onclick=()=>{S.modal=null;S.form={};render();}}
    if(a==='openBook'){el.onclick=()=>{S.modal='book';S.form={};render();}}
    if(a==='openMember'){el.onclick=()=>{S.modal='member';S.form={};render();}}
    if(a.startsWith('tab:')){el.onclick=()=>{S.tab=parseInt(a.split(':')[1]);render();}}
    if(a.startsWith('return:')){el.onclick=()=>returnBorrow(a.split(':')[1]);}
    if(a.startsWith('delBook:')){el.onclick=()=>deleteBook(a.split(':')[1]);}
    if(a.startsWith('editBook:')){el.onclick=()=>editBook(a.split(':')[1]);}
    if(a.startsWith('delMember:')){el.onclick=()=>deleteMember(a.split(':')[1]);}
    if(a.startsWith('editMember:')){el.onclick=()=>editMember(a.split(':')[1]);}
    if(a.startsWith('delPass:')){el.onclick=()=>removePass(decodeURIComponent(a.split(':')[1]));}
    if(a==='submitComplaint')el.onclick=submitComplaint;
    if(a.startsWith('markRead:')){el.onclick=()=>markComplaintRead(a.split(':')[1]);}
    if(a.startsWith('delComplaint:')){el.onclick=()=>deleteComplaint(a.split(':')[1]);}
  });

  const bind=(sel,fn)=>{const el=document.querySelector(sel);if(el)el.oninput=fn;}
  bind('#adminPwField',e=>{S.adminPwInput=e.target.value;});
  bind('#fTitle',e=>{S.form.title=e.target.value;});
  bind('#fAuthor',e=>{S.form.author=e.target.value;});
  bind('#fCat',e=>{S.form.cat=e.target.value;});
  bind('#fTotal',e=>{S.form.total=e.target.value;});
  bind('#fIsbn',e=>{S.form.isbn=e.target.value;});
  bind('#fShelf',e=>{S.form.shelf=e.target.value;});
  bind('#fName',e=>{S.form.name=e.target.value;});
  bind('#fPhone',e=>{S.form.phone=e.target.value;});
  bind('#fAddress',e=>{S.form.address=e.target.value;});
  bind('#fJoinedAt',e=>{S.form.joinedAt=e.target.value;});
  bind('#fNewPass',e=>{S.form.newPass=e.target.value;});
  const gsEl=document.getElementById('globalSearch');
  if(gsEl){
    gsEl.oninput=e=>{S.search=e.target.value;};
    gsEl.onkeyup=e=>{if(e.key==='Enter'||e.key==='Search'){render();}};
    gsEl.onblur=e=>{S.search=e.target.value;render();};
  }
  bind('#complaintInput',e=>{S.complaintText=e.target.value;});
  bind('#searchCat',e=>{S.searchCat=e.target.value;render();});
  bind('#bkQuery',e=>{S.borrow.bookQuery=e.target.value;S.ui.dropBook=true;if(!e.target.value){S.borrow.bookId='';S.borrow.bookTitle='';}render();});
  bind('#mbQuery',e=>{S.borrow.memberQuery=e.target.value;S.ui.dropMember=true;if(!e.target.value){S.borrow.memberId='';S.borrow.memberName='';}render();});

  const apf=document.getElementById('adminPwField');
  if(apf)apf.onkeydown=e=>{if(e.key==='Enter')tryAdminLogin();if(e.key==='Escape')closeAdminLogin();};

  document.addEventListener('click',e=>{
    if(!e.target.closest('#bkDropWrap')&&S.ui.dropBook){S.ui.dropBook=false;render();}
    if(!e.target.closest('#mbDropWrap')&&S.ui.dropMember){S.ui.dropMember=false;render();}
  },{once:true});
}

  </div>
  <div class="card">
    <div class="card-title">ফেরত দেওয়া হয়েছে (সাম্প্রতিক)</div>
    <table class="tbl">
      <thead><tr><th>বই</th><th>সদস্য</th><th>ইস্যু</th><th>ফেরত</th></tr></thead>
      <tbody>
        ${done.length?done.map(b=>`<tr>
          <td>${esc(b.bookTitle)}</td><td>${esc(b.memberName)}</td>
          <td style="font-size:13px;color:var(--muted)">${esc(b.issuedAt)}</td>
          <td style="font-size:13px;color:var(--muted)">${esc(b.returnedAt||'—')}</td>
        </tr>`).join(''):`<tr><td colspan="4" class="empty">কোনো ফেরত রেকর্ড নেই</td></tr>`}
      </tbody>
    </table>
  </div>`;
}

function renderSearch(){
  const q=S.search.toLowerCase().trim(),cat=S.searchCat;
  const books=booksArr().filter(b=>(!q||(b.title+b.author).toLowerCase().includes(q))&&(!cat||b.cat===cat));
  return`
    <div class="card">
      <div class="card-title">বই অনুসন্ধান</div>
      <div class="inp-row">
        <div class="search-wrap" style="max-width:100%"><span class="search-icon">🔍</span><input id="globalSearch" class="inp search-inp" placeholder="নাম বা লেখক..." value="${esc(S.search)}" style="margin-bottom:0"></div>
        <select id="searchCat" class="inp" style="margin-bottom:0">
          <option value="">সব বিভাগ</option>
          ${CATS.map(c=>`<option value="${c}" ${S.searchCat===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    ${q||cat?`<div class="card" style="padding:0;overflow:hidden"><table class="tbl">
      <thead><tr><th>বই</th><th>লেখক</th><th>বিভাগ</th><th>পাওয়া যাচ্ছে</th></tr></thead>
      <tbody>${books.length?books.map(b=>`<tr>
        <td style="font-weight:600">${esc(b.title)}</td><td>${esc(b.author)}</td>
        <td><span class="badge bg-gray">${esc(b.cat)}</span></td>
        <td><span class="badge ${b.avail>0?'bg-green':'bg-red'}">${b.avail>0?b.avail+' কপি':'অনুপলব্ধ'}</span></td>
      </tr>`).join(''):`<tr><td colspan="4" class="empty">কোনো বই পাওয়া যায়নি</td></tr>`}</tbody>
    </table></div>`:`<div class="card"><div class="empty">উপরে লিখুন বা বিভাগ বেছে নিন...</div></div>`}`;
}

function renderSettings(){
  const books=booksArr(),members=membersArr(),borrows=borrowsArr();
  return`
    <div class="card">
      <div class="card-title">পাসওয়ার্ড ব্যবস্থাপনা</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">একাধিক অ্যাডমিনের জন্য আলাদা পাসওয়ার্ড যোগ করুন।</p>
      <table class="tbl">
        <thead><tr><th>#</th><th>পাসওয়ার্ড</th><th></th></tr></thead>
        <tbody>${S.passes.map((p,i)=>`<tr>
          <td style="color:var(--muted)">${i+1}</td>
          <td><span style="font-family:monospace">${'•'.repeat(Math.min(p.length,12))}</span></td>
          <td><button class="btn btn-ghost btn-sm" data-action="delPass:${encodeURIComponent(p)}">মুছুন</button></td>
        </tr>`).join('')}</tbody>
      </table>
      <div style="display:flex;gap:10px;margin-top:16px">
        <input id="fNewPass" class="inp" style="margin-bottom:0;flex:1" type="password" placeholder="নতুন পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)" value="${esc(S.form.newPass||'')}">
        <button class="btn btn-dark" data-action="addPass">যোগ করুন</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">লাইব্রেরি পরিসংখ্যান</div>
      <table class="tbl"><tbody>
        <tr><td>মোট বই (টাইটেল)</td><td style="font-weight:700">${books.length}</td></tr>
        <tr><td>মোট কপি</td><td style="font-weight:700">${books.reduce((a,b)=>a+b.total,0)}</td></tr>
        <tr><td>মোট সদস্য</td><td style="font-weight:700">${members.length}</td></tr>
        <tr><td>সর্বমোট ধার</td><td style="font-weight:700">${borrows.length} বার</td></tr>
        <tr><td>এখন ধারে আছে</td><td style="font-weight:700">${borrows.filter(b=>!b.ret).length}</td></tr>
      </tbody></table>
    </div>`;
}

function renderComplaints(){
  const isAdmin=S.role==='admin';
  const list=Object.entries(S.complaints).map(([id,v])=>({id,...v})).reverse();
  const unread=list.filter(c=>!c.read).length;
  if(!isAdmin){
    return`<div class="card">
      <div class="card-title">📢 অভিযোগ / পরামর্শ পাঠান</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">আপনার অভিযোগ বা পরামর্শ অ্যানোনিমাসভাবে পাঠান। আপনার পরিচয় গোপন থাকবে।</p>
      <textarea id="complaintInput" class="inp" rows="4" placeholder="এখানে আপনার অভিযোগ বা পরামর্শ লিখুন..." style="resize:vertical;min-height:100px">${esc(S.complaintText||'')}</textarea>
      <button class="btn btn-dark" style="width:100%;justify-content:center" data-action="submitComplaint">পাঠান →</button>
    </div>
    <div class="card">
      <p style="font-size:13px;color:var(--muted);text-align:center">🔒 আপনার পরিচয় সম্পূর্ণ গোপন থাকবে।<br>অ্যাডমিন শুধু বার্তাটি দেখতে পাবেন।</p>
    </div>`;
  }
  return`<div class="card">
    <div class="card-title">📢 অভিযোগ / পরামর্শ <span class="badge bg-red">${unread} নতুন</span></div>
    ${list.length?list.map(c=>`
      <div style="padding:14px;border-radius:10px;background:${c.read?'var(--cream)':'var(--blue-bg)'};border:1px solid ${c.read?'var(--border)':'rgba(42,95,158,.2)'};margin-bottom:10px">
        <div style="font-size:14px;color:var(--text);line-height:1.6">${esc(c.text)}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
          <span style="font-size:12px;color:var(--muted)">${esc(c.sentAt||'')} ${c.read?'<span class="badge bg-green">পড়া হয়েছে</span>':'<span class="badge bg-blue">নতুন</span>'}</span>
          <div class="btn-grp">
            ${!c.read?`<button class="btn btn-blue btn-sm" data-action="markRead:${c.id}">পড়া হয়েছে</button>`:''}
            <button class="btn btn-ghost btn-sm" data-action="delComplaint:${c.id}">🗑️</button>
          </div>
        </div>
      </div>`).join(''):`<div class="empty">কোনো অভিযোগ নেই</div>`}
  </div>`;
}

function renderModal(){
  let content='';
  if(S.modal==='book'){
    const isEdit=!!S.form.editId;
    content=`
      <div class="modal-head"><span class="modal-title">${isEdit?'বই এডিট করুন':'নতুন বই যোগ করুন'}</span><button class="modal-close" data-action="closeModal">✕</button></div>
      <input id="fTitle" class="inp" placeholder="বইয়ের নাম *" value="${esc(S.form.title||'')}">
      <input id="fAuthor" class="inp" placeholder="লেখকের নাম" value="${esc(S.form.author||'')}">
      <select id="fCat" class="inp"><option value="">বিভাগ বেছে নিন *</option>${CATS.map(c=>`<option value="${c}" ${S.form.cat===c?'selected':''}>${c}</option>`).join('')}</select>
      <div class="inp-row">
        <input id="fTotal" class="inp" type="number" min="1" placeholder="কপি সংখ্যা" value="${esc(S.form.total||'')}">
        <input id="fShelf" class="inp" placeholder="তাক/র‍্যাক নং" value="${esc(S.form.shelf||'')}">
      </div>
      <input id="fIsbn" class="inp" placeholder="ISBN (ঐচ্ছিক)" value="${esc(S.form.isbn||'')}">
      <div class="modal-foot">
        <button class="btn btn-dark" data-action="saveBook">${isEdit?'আপডেট করুন':'সংরক্ষণ করুন'}</button>
        <button class="btn btn-ghost" data-action="closeModal">বাতিল</button>
      </div>`;
  } else if(S.modal==='member'){
    const isEdit=!!S.form.editId;
    content=`
      <div class="modal-head"><span class="modal-title">${isEdit?'সদস্য এডিট করুন':'নতুন সদস্য যোগ করুন'}</span><button class="modal-close" data-action="closeModal">✕</button></div>
      <input id="fName" class="inp" placeholder="সদস্যের নাম *" value="${esc(S.form.name||'')}">
      <input id="fPhone" class="inp" placeholder="ফোন নম্বর *" value="${esc(S.form.phone||'')}">
      <input id="fAddress" class="inp" placeholder="ঠিকানা (ঐচ্ছিক)" value="${esc(S.form.address||'')}">
      ${S.form.editId?`<input id="fJoinedAt" class="inp" placeholder="যোগদানের তারিখ (যেমন: ২৫ এপ্রিল, ২০২৬)" value="${esc(S.form.joinedAt||'')}">`:``}
      <div class="modal-foot">
        <button class="btn btn-dark" data-action="saveMember">${isEdit?'আপডেট করুন':'সংরক্ষণ করুন'}</button>
        <button class="btn btn-ghost" data-action="closeModal">বাতিল</button>
      </div>`;
  }
  return`<div class="modal-overlay" onclick="if(event.target===this){S.modal=null;S.form={};render();}"><div class="modal-box">${content}</div></div>`;
}

window.selectBook=function(id,title){S.borrow.bookId=id;S.borrow.bookTitle=title;S.borrow.bookQuery=title;S.ui.dropBook=false;render();};
window.selectMember=function(id,name){S.borrow.memberId=id;S.borrow.memberName=name;S.borrow.memberQuery=name;S.ui.dropMember=false;render();};

window.addEventListener('online',()=>document.getElementById('offlineBar').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offlineBar').classList.add('show'));

if(window._fbReady)initListeners();
else window.addEventListener('fbReady',initListeners);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
